name: Runner Connection Test

on:
  workflow_dispatch: # Manual trigger
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main  # Only run heavy tests on dev → main PRs

jobs:
  test-runner-qxub:
    runs-on: self-hosted

    steps:
    - name: Verify qxub installation
      run: |
        echo "=== Verifying qxub installation ==="
        which qxub
        qxub --version

    - name: Check qxub platform configuration
      run: |
        echo "=== Checking platform configuration ==="
        qxub platform list
        qxub config get defaults.platform || echo "No default platform set"
        # Note: qxub exec tests require SSH to NCI Gadi (the default platform)
        # Those tests are skipped since SSH keys may not be configured
